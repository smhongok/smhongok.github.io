name: Build Alt3 CV PDF

on:
  workflow_dispatch:
  push:
    paths:
      - 'CV_SMH_alt3.tex'
      - 'CV_preamble.tex'
      - 'CV_body_alt3.tex'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Compile LaTeX
        uses: xu-cheng/latex-action@v3
        with:
          root_file: CV_SMH_alt3.tex
          latexmk_use_pdflatex: true

      - name: Move PDF to files/
        run: mv CV_SMH_alt3.pdf files/CV_smhong_alt3.pdf

      - name: Commit updated PDF
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add files/CV_smhong_alt3.pdf
          git diff --cached --quiet || git commit -m "chore: rebuild alt3 CV PDF from CV_SMH_alt3.tex"
          git push
